  summary: Maps the documented AnkiIO domain to a conservative subset of CrowdAnki's JSON shape.
  remarks: This adapter is independently implemented from observed public behavior. It does not claim full CrowdAnki compatibility and intentionally omits scheduling, card IDs, and review history because CrowdAnki JSON does not reliably represent them.
