name: CI
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-test-pack:
    strategy:
      matrix: { os: [ubuntu-latest, windows-latest, macos-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet restore AnkiIO.sln --locked-mode
      - run: dotnet format AnkiIO.sln --verify-no-changes --no-restore
      - run: dotnet build AnkiIO.sln -c Release --no-restore
      - run: dotnet test AnkiIO.sln -c Release --no-build --no-restore --filter "Category!=LocalAnkiCompatibility" --collect:"XPlat Code Coverage" --results-directory artifacts/test-results
      - run: dotnet pack src/AnkiIO/AnkiIO.csproj -c Release --no-build -o artifacts/packages
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: artifacts-${{ matrix.os }}, path: artifacts }
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet tool restore
      - run: dotnet restore
      - run: dotnet docfx docs/docfx.json --warningsAsErrors
      - uses: actions/upload-artifact@v4
        with: { name: documentation, path: artifacts/docs }
