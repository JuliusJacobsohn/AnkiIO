name: CI
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-test-pack:
    strategy:
      matrix: { os: [ubuntu-latest, windows-latest, macos-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - name: Resolve package version
        shell: pwsh
        run: |
          $versionOutput = & dotnet msbuild src/AnkiIO/AnkiIO.csproj -nologo -getProperty:PackageVersion
          if ($LASTEXITCODE -ne 0) { throw "Package version resolution failed." }
          $version = ($versionOutput | Select-Object -Last 1).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Package version resolution returned an empty value." }
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          "PACKAGE_PATH=artifacts/packages/AnkiIO.$version.nupkg" >> $env:GITHUB_ENV
      - run: dotnet restore AnkiIO.sln --locked-mode
      - run: dotnet format AnkiIO.sln --verify-no-changes --no-restore
      - run: dotnet build AnkiIO.sln -c Release --no-restore
      - run: dotnet build samples/AnkiIO.Samples/AnkiIO.Samples.csproj -c Release
      - run: dotnet build benchmarks/AnkiIO.Benchmarks/AnkiIO.Benchmarks.csproj -c Release
      - run: dotnet test AnkiIO.sln -c Release --no-build --no-restore --filter "Category!=LocalAnkiCompatibility" --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory artifacts/test-results
      - run: dotnet tool restore
      - run: dotnet tool run reportgenerator "-reports:artifacts/test-results/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage" "-reporttypes:Cobertura;Html"
      - shell: pwsh
        run: ./build/verify-coverage.ps1 artifacts/coverage/Cobertura.xml 80 60
      - run: dotnet pack src/AnkiIO/AnkiIO.csproj -c Release --no-build -o artifacts/packages
      - shell: pwsh
        run: ./build/validate-package.ps1 $env:PACKAGE_PATH
      - shell: pwsh
        run: ./build/test-package-consumer.ps1 artifacts/packages $env:PACKAGE_VERSION
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: "artifacts-${{ matrix.os }}", path: artifacts }
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.301
      - shell: pwsh
        run: ./build/build-docs.ps1
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: documentation, path: artifacts/docs }
