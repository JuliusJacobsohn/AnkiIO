name: Release
on:
  workflow_dispatch:
    inputs:
      tag: { description: SemVer tag, required: true, default: v0.1.0-alpha.1, type: string }
      create_release: { description: Create GitHub prerelease, required: true, default: false, type: boolean }
      publish: { description: Publish to NuGet, required: true, default: false, type: boolean }
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.301
      - name: Resolve and validate release identity
        shell: pwsh
        env:
          WORKFLOW_REF: ${{ github.ref }}
          REQUESTED_TAG: ${{ inputs.tag }}
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ($env:WORKFLOW_REF -ne 'refs/heads/main') { throw "Releases must be dispatched from the main branch, not '$env:WORKFLOW_REF'." }
          $versionOutput = & dotnet msbuild src/AnkiIO/AnkiIO.csproj -nologo -getProperty:PackageVersion
          if ($LASTEXITCODE -ne 0) { throw "Package version resolution failed." }
          $version = ($versionOutput | Select-Object -Last 1).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Package version resolution returned an empty value." }
          $expectedTag = "v$version"
          if ($env:REQUESTED_TAG -ne $expectedTag) { throw "Requested tag '$env:REQUESTED_TAG' must equal package tag '$expectedTag'." }
          if ($env:PUBLISH_REQUESTED -eq 'true' -and [string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) { throw "NuGet publication was requested, but NUGET_API_KEY is not configured." }
          git fetch --force --tags
          if ($LASTEXITCODE -ne 0) { throw "Fetching release tags failed." }
          $tagCommit = & git rev-parse --verify "refs/tags/$expectedTag^{commit}" 2>$null
          if ($LASTEXITCODE -eq 0 -and $tagCommit.Trim() -ne $env:GITHUB_SHA) { throw "Existing tag '$expectedTag' does not point to the workflow commit $env:GITHUB_SHA." }
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          "PACKAGE_PATH=artifacts/release/AnkiIO.$version.nupkg" >> $env:GITHUB_ENV
          "RELEASE_TAG=$expectedTag" >> $env:GITHUB_ENV
      - run: dotnet restore AnkiIO.sln --locked-mode
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build --filter "Category!=LocalAnkiCompatibility"
      - shell: pwsh
        run: ./build/build-docs.ps1
      - run: dotnet pack src/AnkiIO/AnkiIO.csproj -c Release --no-build -o artifacts/release
      - shell: pwsh
        run: ./build/validate-package.ps1 $env:PACKAGE_PATH
      - shell: pwsh
        run: ./build/test-package-consumer.ps1 artifacts/release $env:PACKAGE_VERSION
      - name: Checksums
        run: sha256sum artifacts/release/* > artifacts/release/SHA256SUMS
      - name: Bind release tag to built commit
        if: inputs.publish || inputs.create_release
        shell: pwsh
        run: |
          $tagCommit = & git rev-parse --verify "refs/tags/$env:RELEASE_TAG^{commit}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($tagCommit.Trim() -ne $env:GITHUB_SHA) { throw "Release tag moved during the workflow." }
          }
          else {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag $env:RELEASE_TAG $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) { throw "Creating release tag failed." }
            git push origin "refs/tags/$env:RELEASE_TAG"
            if ($LASTEXITCODE -ne 0) { throw "Publishing release tag failed." }
          }
      - name: Publish NuGet
        if: inputs.publish
        env: { NUGET_API_KEY: "${{ secrets.NUGET_API_KEY }}" }
        run: dotnet nuget push "artifacts/release/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
      - name: Create GitHub prerelease
        if: inputs.create_release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "$RELEASE_TAG" artifacts/release/* --generate-notes --prerelease --verify-tag
      - uses: actions/upload-artifact@v4
        with: { name: release-dry-run, path: artifacts/release }
