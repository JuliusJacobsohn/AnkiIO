name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer tag matching the package version
        required: true
        default: v1.0.0
        type: string
      create_release:
        description: Create a stable GitHub release
        required: true
        default: false
        type: boolean
      publish:
        description: Publish packages to NuGet
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Verify and prepare ${{ inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Resolve and validate release identity
        shell: pwsh
        env:
          WORKFLOW_REF: ${{ github.ref }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if ($env:WORKFLOW_REF -ne 'refs/heads/main') { throw "Releases must be dispatched from the main branch, not '$env:WORKFLOW_REF'." }
          $versionOutput = & dotnet msbuild src/AnkiIO/AnkiIO.csproj -nologo -getProperty:PackageVersion
          if ($LASTEXITCODE -ne 0) { throw "Package version resolution failed." }
          $version = ($versionOutput | Select-Object -Last 1).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Package version resolution returned an empty value." }
          $expectedTag = "v$version"
          if ($env:REQUESTED_TAG -ne $expectedTag) { throw "Requested tag '$env:REQUESTED_TAG' must equal package tag '$expectedTag'." }
          git fetch --force --tags
          if ($LASTEXITCODE -ne 0) { throw "Fetching release tags failed." }
          $tagCommit = & git rev-parse --verify "refs/tags/$expectedTag^{commit}" 2>$null
          if ($LASTEXITCODE -eq 0 -and $tagCommit.Trim() -ne $env:GITHUB_SHA) { throw "Existing tag '$expectedTag' does not point to the workflow commit $env:GITHUB_SHA." }
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          "PACKAGE_PATH=artifacts/release/AnkiIO.$version.nupkg" >> $env:GITHUB_ENV
          "RELEASE_TAG=$expectedTag" >> $env:GITHUB_ENV
      - name: Run complete release gate
        shell: pwsh
        run: ./build/build.ps1
      - name: Assemble and revalidate release payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/release -Force | Out-Null
          Copy-Item -LiteralPath "artifacts/packages/AnkiIO.$env:PACKAGE_VERSION.nupkg" -Destination artifacts/release
          Copy-Item -LiteralPath "artifacts/packages/AnkiIO.$env:PACKAGE_VERSION.snupkg" -Destination artifacts/release
          ./build/validate-package.ps1 $env:PACKAGE_PATH $env:PACKAGE_VERSION
          ./build/test-package-consumer.ps1 artifacts/release $env:PACKAGE_VERSION
      - name: Create checksums
        shell: pwsh
        run: |
          $lines = Get-ChildItem -LiteralPath artifacts/release -File |
            Sort-Object Name |
            ForEach-Object { "{0}  {1}" -f (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant(), $_.Name }
          [System.IO.File]::WriteAllLines((Join-Path $PWD "artifacts/release/SHA256SUMS"), $lines, [System.Text.UTF8Encoding]::new($false))
      - name: Bind release tag to verified commit
        if: inputs.publish || inputs.create_release
        shell: pwsh
        run: |
          $tagCommit = & git rev-parse --verify "refs/tags/$env:RELEASE_TAG^{commit}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($tagCommit.Trim() -ne $env:GITHUB_SHA) { throw "Release tag moved during the workflow." }
          }
          else {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag $env:RELEASE_TAG $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) { throw "Creating release tag failed." }
            git push origin "refs/tags/$env:RELEASE_TAG"
            if ($LASTEXITCODE -ne 0) { throw "Publishing release tag failed." }
          }
      - name: Authenticate with NuGet.org
        if: inputs.publish
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: JuliusJacobsohn
      - name: Publish NuGet packages
        if: inputs.publish
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/release/AnkiIO.${PACKAGE_VERSION}.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
      - name: Create stable GitHub release
        if: inputs.create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" artifacts/release/* --title "AnkiIO $PACKAGE_VERSION" --generate-notes --verify-tag
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-${{ inputs.tag }}
          path: artifacts/release
          if-no-files-found: warn
          retention-days: 14
