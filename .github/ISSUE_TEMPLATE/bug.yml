name: Bug report
description: Report a reproducible problem using synthetic data.
body:
  - type: textarea
    id: description
    attributes: { label: Description }
    validations: { required: true }
  - type: input
    id: versions
    attributes: { label: AnkiIO, Anki, .NET, and OS versions }
    validations: { required: true }
  - type: textarea
    id: reproduction
    attributes: { label: Minimal synthetic reproduction }
    validations: { required: true }
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I have not attached a real/private collection or media.
          required: true
