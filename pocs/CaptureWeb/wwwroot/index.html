<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>AnkiIO capture probe</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #080b12; color: #f8fafc; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
    main { width: min(42rem, calc(100% - 2rem)); padding: 1rem 0 3rem; }
    h1 { margin-bottom: .25rem; }
    .warning { color: #fbbf24; }
    .status { padding: 1rem; border-radius: .75rem; background: #111827; margin: 1rem 0; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    button { min-height: 4rem; border: 0; border-radius: .75rem; font: inherit; font-weight: 700; }
    #start { background: #22c55e; color: #052e16; }
    #stop { background: #ef4444; color: white; }
    button:disabled { opacity: .35; }
    label { display: flex; gap: .65rem; align-items: center; margin: 1rem 0; }
    textarea { width: 100%; min-height: 15rem; box-sizing: border-box; background: #020617; color: #cbd5e1; border: 1px solid #334155; border-radius: .5rem; padding: .75rem; }
  </style>
</head>
<body>
<main>
  <h1>Capture probe</h1>
  <p class="warning">Local PoC only: no authentication. Do not expose publicly or record sensitive speech.</p>
  <div class="status" id="status">Idle</div>
  <div class="actions">
    <button id="start" type="button">Enable &amp; record</button>
    <button id="stop" type="button" disabled>Stop &amp; upload</button>
  </div>
  <label><input id="autostart" type="checkbox"> Try auto-start on the next launch</label>
  <audio id="playback" controls hidden></audio>
  <h2>Timing/event log</h2>
  <textarea id="log" readonly></textarea>
  <button id="copy" type="button">Copy log</button>
</main>
<script src="/app.js" defer></script>
</body>
</html>
